<script>

/* =========================================================
   Supabase接続設定
   ========================================================= */
const sb = window.supabase.createClient(
  "https://zyvpzobykvuscxuhsrad.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5dnB6b2J5a3Z1c2N4dWhzcmFkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk3OTE0NTAsImV4cCI6MjA4NTM2NzQ1MH0.Z2cKv3VSlk3iibQl7ldwcff9WF5cBHTZkcrdvxA2Bbk"
);

/* =========================================================
   グローバル変数定義
   ========================================================= */
let miniMap = null;            // 現在利用中の小地図
let miniMarker = null;         // 小地図マーカー
let currentSelectedId = null;  // 現在利用中ID
let overlayLayer = null;       // （未使用変数）
let popupOpen = false;
let currentParkingId = null;   // 利用開始中の駐車場ID
/* ユーザー識別ID（ローカル保存） */
let myUserId = localStorage.getItem("myParkingUserId");
if (!myUserId) {
  myUserId = crypto.randomUUID();
  localStorage.setItem("myParkingUserId", myUserId);
}

let firstLoad = true; // 初回読み込み判定フラグ
let usageRecorded = false; // 利用記録済みフラグ

/* =========================================================
   メインマップ初期化
   ========================================================= */
let map = L.map('map').setView([35.0, 135.0], 14);

/* OpenStreetMapタイル読み込み */
L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  { attribution: '© OpenStreetMap' }
).addTo(map);

/* クラスターマーカー設定 */
let markerGroup = L.markerClusterGroup({
  chunkedLoading: true,
  chunkInterval: 200,
  chunkDelay: 50
});
map.addLayer(markerGroup);

/* =========================================================
   駐車場データ読み込み
   ========================================================= */
async function loadParking() {

  markerGroup.clearLayers(); // 既存マーカー削除

  let query = sb
    .from("parking_spaces")
    .select("id,title,price,latitude,longitude,is_available,rented_by,image_url,comment");

  /* 初回以外は現在表示範囲のみ取得 */
  if (!firstLoad) {
    const bounds = map.getBounds();

    query = query
      .gte("latitude", bounds.getSouth())
      .lte("latitude", bounds.getNorth())
      .gte("longitude", bounds.getWest())
      .lte("longitude", bounds.getEast());
  }

  const { data, error } = await query;

  console.log("取得データ:", data);
  console.log("取得エラー:", error);

  if (error) {
    console.log(error);
    return;
  }

  if (!data || data.length === 0) {
    return;
  }

  let latlngs = [];
  let myParking = null;

  data.forEach(space => {

    /* 自分が利用中か判定 */
    if (space.rented_by === myUserId) {
      myParking = space;
    }

    /* 他人利用中は非表示 */
    if (!space.is_available && space.rented_by !== myUserId) {
      return;
    }

    const lat = Number(space.latitude);
    const lng = Number(space.longitude);

    latlngs.push([lat, lng]);

    const marker = L.marker([lat, lng]);

    /* ポップアップ生成 */
    marker.bindPopup(`
      <div style="font-family: 'Segoe UI', sans-serif; padding: 10px; max-width: 250px;">
        <h3 style="margin: 0 0 8px; font-size: 28px; color: #2c3e50;">
          ${space.title}
        </h3>
        <p style="margin: 0 0 12px; color: #e74c3c; font-size: 28px; font-weight: bold;">
          ￥${space.price.toLocaleString()} / 1日利用
        </p>
        ${space.comment ? `<p style="margin: 0 0 12px; font-size: 20px;">${space.comment}</p>` : ''}
        <div style="text-align: center;">
          <button 
            onclick="useParking('${space.id}')" 
            style="
              background-color: #7293a8;
              color: white;
              border: none;
              padding: 8px 12px;
              border-radius: 0;
              cursor: pointer;
              font-size: 24px;
              display: inline-flex;
              align-items: center;
              gap: 6px;
            "
          >
            予約する
          </button>
        </div>
      </div>
    `, {
      autoPan: false
    });

    markerGroup.addLayer(marker);
  });

  /* 初回のみ自動ズーム */
  if (firstLoad && latlngs.length > 0) {
    map.fitBounds(latlngs);
    firstLoad = false;
  }

  updateCurrentArea(myParking);
}

/* =========================================================
   現在利用中エリアUI更新
   ========================================================= */
function updateCurrentArea(space) {

  if (!space) {
    document.getElementById("currentInfo").innerHTML =
      "利用中の駐車場はありません";

    if (miniMap) {
      miniMap.remove();
      miniMap = null;
    }

    document.getElementById("miniMap").style.display = "none";
    return;
  }

  currentSelectedId = space.id;

  document.getElementById("currentInfo").innerHTML = `
    <div style="font-family:sans-serif;">
      <h4 style="margin-bottom:8px;">${space.title}</h4>

      ${space.image_url ? `
        <img src="${space.image_url}"
          style="width:100%;max-height:200px;height:180px;object-fit:contain;
          margin-bottom:10px;border:1px solid #ccc;background:#fff;">
      ` : ""}

      <p style="font-size:18px;color:red;margin:5px 0;">
        ${space.price} 円
      </p>

      ${usageRecorded ? `
        <button disabled style="opacity:0.5;cursor:not-allowed;">
          キャンセル（利用中）
        </button>
      ` : `
        <button onclick="cancelParking('${space.id}')">
          キャンセルする
        </button>
      `}

      ${usageRecorded ? `
        <button onclick="recordUsageEnd('${space.id}')">
          利用終了
        </button>
      ` : `
        <button onclick="recordUsage('${space.id}')">
          利用開始
        </button>
      `}

      <button onclick="openGoogleMap(${space.latitude},${space.longitude})">
        Googleマップで開く
      </button>
    </div>
  `;

  document.getElementById("miniMap").style.display = "block";

  if (miniMap) {
    miniMap.remove();
  }

  miniMap = L.map('miniMap')
    .setView([space.latitude, space.longitude], 17);

  L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
  ).addTo(miniMap);

  miniMarker = L.marker([space.latitude, space.longitude])
    .addTo(miniMap);
}

/* =========================================================
   利用記録テーブルへの書き込み
   ========================================================= */
async function recordUsage(parkingId) {
  console.log("利用記録追加:", parkingId);

  // 予約されていない場合は中止
  if (!currentSelectedId || currentSelectedId !== parkingId) {
    alert('まず予約してください。');
    return;
  }

  // 既に記録済みなら処理中止
  if (usageRecorded) {
    console.log("既に利用記録済みです");
    return;
  }

  // モーダルを表示
  currentParkingId = parkingId;
  document.getElementById('carNumberModal').style.display = 'block';
}

/* =========================================================
   利用終了を parking_usage に記録
   ========================================================= */
async function recordUsageEnd(parkingId) {
  console.log("利用終了記録:", parkingId);

  if (!usageRecorded) {
    console.log("利用開始記録がありません");
    return;
  }

  // 最新の未完了レコードを取得
  let query = sb
    .from('parking_usage')
    .select('id')
    .eq('parking_id', parkingId)
    .is('ended_at', null)
    .order('used_at', { ascending: false })
    .limit(1);

  // ユーザーIDでフィルタ（認証されている場合のみ）
  const user = await sb.auth.getUser();
  console.log('recordUsageEnd: parkingId=', parkingId, 'user=', user);
  if (user && user.data && user.data.user && user.data.user.id) {
    query = query.eq('user_id', user.data.user.id);
  } else {
    query = query.is('user_id', null);
  }

  const { data: records, error: queryError } = await query;
  console.log('records:', records, 'error:', queryError);

  if (queryError) {
    console.error('recordUsageEnd query error', queryError);
    alert('利用終了記録の保存中にエラーが発生しました');
    return;
  }

  if (!records || records.length === 0) {
    alert('利用開始記録が見つかりません');
    return;
  }

  const recordId = records[0].id;

  // 利用終了時刻を記録
  const { data, error } = await sb
    .from('parking_usage')
    .update({ ended_at: new Date().toISOString() })
    .eq('id', recordId);

  if (error) {
    console.error('recordUsageEnd error', error);
    alert('利用終了記録の保存中にエラーが発生しました');
    return;
  }

  console.log('利用終了記録保存完了', data);

  // 駐車場を利用可能に戻す
  const { error: updateError } = await sb
    .from('parking_spaces')
    .update({
      is_available: true,
      rented_by: null
    })
    .eq('id', parkingId);

  if (updateError) {
    console.error('駐車場更新エラー', updateError);
    alert('駐車場の更新中にエラーが発生しました');
    return;
  }

  usageRecorded = false;
  currentSelectedId = null;
  await loadParking(); // UI を再レンダリング
}

/* =========================================================
   地図移動後に再取得
   ========================================================= */
    map.on("moveend", () => {
      loadParking();
    });

    /* 初期ロード */
    loadParking();

/* =========================================================
   Realtime更新監視
   ========================================================= */
sb.channel('parking-channel')
  .on(
    'postgres_changes',
    { event: 'UPDATE', schema: 'public', table: 'parking_spaces' },
    (payload) => {

      const newRow = payload.new;
      const bounds = map.getBounds();

      if (
        newRow.latitude >= bounds.getSouth() &&
        newRow.latitude <= bounds.getNorth() &&
        newRow.longitude >= bounds.getWest() &&
        newRow.longitude <= bounds.getEast()
      ) {
        loadParking();
      }
    }
  )
  .subscribe();

/* =========================================================
   利用処理
   ========================================================= */
async function useParking(id) {

  console.log("利用開始:", id);

  if (currentSelectedId) {
    console.log("すでに利用中");
    return;
  }

  const { data, error } = await sb
    .from("parking_spaces")
    .update({
      is_available: false,
      rented_by: myUserId
    })
    .eq("id", id)
    .eq("is_available", true)
    .select();

  console.log("更新結果:", data);
  console.log("エラー:", error);

  if (error) {
    alert("エラーが発生しました");
    return;
  }

  if (!data || data.length === 0) {
    alert("すでに利用されています");
    return;
  }

  currentSelectedId = id;

  await loadParking();
}

/* =========================================================
   キャンセル処理
   ========================================================= */
async function cancelParking(id) {

  currentSelectedId = null;
  usageRecorded = false;

  await sb
    .from("parking_spaces")
    .update({
      is_available: true,
      rented_by: null
    })
    .eq("id", id)
    .eq("rented_by", myUserId);

  loadParking();
}

/* =========================================================
   Googleマップ起動
   ========================================================= */
function openGoogleMap(lat, lng) {
  const url = `https://www.google.com/maps?q=${lat},${lng}`;
  window.open(url, "_blank");
}

/* =========================================================
   モーダル関連関数
   ========================================================= */
document.addEventListener('DOMContentLoaded', function() {
  // 分類番号：数字のみ
  document.getElementById('classNumber').addEventListener('input', function(e) {
    e.target.value = e.target.value.replace(/[^0-9]/g, '');
  });

  // 一連指定番号：数字と「-」のみ
  document.getElementById('serialNumber').addEventListener('input', function(e) {
    e.target.value = e.target.value.replace(/[^0-9\-]/g, '');
  });

  document.getElementById('carNumberForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const region = document.getElementById('region').value.trim();
    const classNumber = document.getElementById('classNumber').value.trim();
    const kana = document.getElementById('kana').value.trim();
    const serialNumber = document.getElementById('serialNumber').value.trim();

    if (!region || !classNumber || !kana || !serialNumber) {
      alert('全ての項目を入力してください。');
      return;
    }

    const carNumber = `${region} ${classNumber} ${kana} ${serialNumber}`;

    console.log('保存開始: parking_id=', currentParkingId, 'car_number=', carNumber);

    // モーダルを閉じる
    closeModal();

    // 既に記録済みなら処理中止
    if (usageRecorded) {
      return;
    }

    // 即座にロック（並行実行を防ぐ）
    usageRecorded = true;

    // Supabase authユーザーがある場合のみ user_id を設定
    let payload = { parking_id: currentParkingId, car_number: carNumber };
    const user = await sb.auth.getUser();
    if (user && user.data && user.data.user && user.data.user.id) {
      payload.user_id = user.data.user.id;
    }

    console.log('payload:', payload);

    const { data, error } = await sb
      .from('parking_usage')
      .insert(payload);

    console.log('insert result:', data, error);

    if (error) {
      console.error('recordUsage error', error);
      alert('利用記録の保存中にエラーが発生しました: ' + error.message);
      usageRecorded = false; // エラー時はロック解除
      return;
    }

    console.log('利用記録保存完了', data);
    await loadParking(); // UI を再レンダリング
  });
});

function closeModal() {
  document.getElementById('carNumberModal').style.display = 'none';
  document.getElementById('carNumberForm').reset();
}

</script>
